name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun simctl list runtimes | grep -i ios || true

      - name: Regenerate Xcode project
        run: python3 scripts/generate_project.py

      - name: Select an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; u=[x['udid'] for r,v in d.items() if 'iOS' in r for x in v if x.get('isAvailable') and x['name'].startswith('iPhone')]; print(u[0] if u else '')")
          if [ -z "$UDID" ]; then
            echo "::error::No available iPhone simulator found on the runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Selected simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project ShadowLens.xcodeproj \
            -scheme ShadowLens \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project ShadowLens.xcodeproj \
            -scheme ShadowLens \
            -configuration Debug \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
